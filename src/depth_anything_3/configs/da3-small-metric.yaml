__object__:
  path: depth_anything_3.model.da3
  name: DepthAnything3Net
  args: as_params

net:
  __object__:
    path: depth_anything_3.model.dinov2.dinov2
    name: DinoV2
    args: as_params

  name: vits
  out_layers: [5, 7, 9, 11]
  alt_start: 4
  qknorm_start: 4
  rope_start: 4
  cat_token: True
  scale_token: True

head:
  __object__:
    path: depth_anything_3.model.dualdpt
    name: DualDPT
    args: as_params

  dim_in: &head_dim_in 768
  output_dim: 2
  features: &head_features 64
  out_channels: &head_out_channels [48, 96, 192, 384]

scale_head:
  __object__:
    path: depth_anything_3.model.scale_head
    name: ScaleHead
    args: as_params

  dim_in: 384
  hidden_dim: 256
  num_layers: 3
  out_dim: 1
  activation: relu
  dropout: 0.0
  reduce: mean
  final_activation: softplus


cam_enc:
  __object__:
    path: depth_anything_3.model.cam_enc
    name: CameraEnc
    args: as_params

  dim_out: 384

cam_dec:
  __object__:
    path: depth_anything_3.model.cam_dec
    name: CameraDec
    args: as_params

  dim_in: 768
